services:
  # Backend Web Service
  - type: web
    name: exam-pro-anchala-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        sync: false # Set this manually in Render dashboard
      - key: TURSO_URL
        sync: false # Set this manually in Render dashboard
      - key: TURSO_AUTH_TOKEN
        sync: false # Set this manually in Render dashboard

  # Frontend Static Site
  - type: web
    name: exam-pro-anchala-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: exam-pro-anchala-backend
          property: host
